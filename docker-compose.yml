services:
  machine-bridge:
    # Rename service from 'app' to 'nextjs-app' for clarity, if needed (or keep 'app' if you prefer, but be consistent)
    build:
      context: ..
      dockerfile: machine-bridge/.devcontainer/Dockerfile
      network: host

    restart: unless-stopped
    network_mode: host 
    env_file:
      - .env
    volumes:
      # Keep the bind mount for development
      - .:/workspaces/machine-bridge
      # Mount local SDK so dependency updates are available to the container
      - ../machine-sdk:/workspaces/machine-sdk
      # Hide the host's node_modules
      - /workspaces/machine-bridge/node_modules

    # Reinstall deps and rebuild local SDK on start so latest SDK changes are used
    command: >-
      sh -lc "npm install && npm --prefix /workspaces/machine-sdk run build && npm run build && npm start"

    logging:
      driver: "json-file"
      options:
        max-size: "100m"
        max-file: "3"